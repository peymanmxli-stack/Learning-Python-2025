{% extends "base.html" %}

{% block title %}Inicio - Universidad Politécnica de Baja California{% endblock %}

{% block content %}

<style>

body {
    margin: 0;
    padding: 0;
    background-color: #3d0066;   /* Outside background */
}

/* Outer area */
.main-section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Middle rounded card */
.content-box {
    background-color: #5f0fa3;   
    width: 99%;
    max-width: 1900px;
    min-height: 1000px;          /* Taller */
    border-radius: 70px;
    border: 10px solid gold;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 80px 60px;
    text-align: center;
}

/* Bigger Logo */
.main-logo {
    width: 420px;      /* Bigger logo */
    margin-bottom: 30px;
}

/* University Name */
.university-name {
    font-size: 30px;
    font-weight: bold;
    color: white;
    margin-bottom: 30px;
}

/* System Title */
.system-title {
    font-size: 26px;
    font-weight: 500;
    color: white;
    margin-bottom: 50px;
}

/* Buttons */
.btn-custom {
    width: 240px;
    padding: 12px;
    margin: 12px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(to right, #2b7de9, #1f5fd1);
    color: white;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s ease;
}

.btn-custom:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #1f5fd1, #144bb0);
}

</style>

<div class="main-section">
    <div class="content-box">

        <img src="{{ url_for('static', filename='images/logo.png') }}" class="main-logo">

        <div class="university-name">
            Universidad Politécnica de Baja California
        </div>

        <div class="system-title">
            Sistema de Control de Asistencia
        </div>

        <a href="/login" class="btn-custom">Iniciar Sesión</a>
        <a href="/register" class="btn-custom">Registrar</a>

    </div>
</div>

{% endblock %}
