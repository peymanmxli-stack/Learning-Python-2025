{% extends "base.html" %}
{% block title %}Registrar{% endblock %}
{% block content %}

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #3d0066;
}

.main-section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.content-box {
    background-color: #5f0fa3;
    width: 95%;
    max-width: 1300px;
    border-radius: 60px;
    border: 10px solid gold;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    padding: 50px;
}

.main-logo {
    width: 350px;
    display: block;
    margin: 0 auto 30px auto;
}

.form-container {
    width: 100%;
    max-width: 900px;
    margin: auto;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-row input,
.form-row select {
    flex: 1;
}

.form-input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

.btn-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 25px;
}

.btn-custom {
    width: 220px;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(to right, #2b7de9, #1f5fd1);
    color: white;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn-custom:hover {
    transform: scale(1.05);
}

.preview-img {
    width: 120px;
    height: 120px;
    border-radius: 10px;
    object-fit: cover;
    border: 3px solid gold;
}
</style>

<div class="main-section">
<div class="content-box">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="main-logo">

<form method="POST" enctype="multipart/form-data" class="form-container">

<!-- Username + CURP -->
<div class="form-row">
    <input type="text" name="username" placeholder="*Nombre de Usuario" class="form-input" required>
    <input type="text" name="curp" placeholder="*CURP" class="form-input" required>
</div>

<!-- Nombre Paterno + Nombre Materno -->
<div class="form-row">
    <input type="text" name="nombre_paterno" placeholder="*Nombre Paterno" class="form-input" required>
    <input type="text" name="nombre_materno" placeholder="*Nombre Materno" class="form-input" required>
</div>

<!-- Apellido Paterno + Apellido Materno -->
<div class="form-row">
    <input type="text" name="apellido_paterno" placeholder="*Apellido Paterno" class="form-input" required>
    <input type="text" name="apellido_materno" placeholder="*Apellido Materno" class="form-input" required>
</div>

<!-- Contraseña -->
<div class="form-row">
    <input type="password" name="password" placeholder="*Contraseña" class="form-input" required>
    <input type="password" placeholder="*Confirmar Contraseña" class="form-input" required>
</div>

<!-- Número Celular + Correo -->
<div class="form-row">
    <input type="text" name="celular" placeholder="*Número Celular" class="form-input" required>
    <input type="email" name="correo" placeholder="*Correo Electrónico" class="form-input" required>
</div>

<!-- Rol + Matrícula -->
<div class="form-row">
    <select name="rol" id="rol" class="form-input" required onchange="mostrarMatricula()">
        <option value="">*Selecciona Rol</option>
        <option value="Alumno">Alumno</option>
        <option value="Docente">Docente</option>
    </select>

    <input type="text" name="matricula" id="matricula" placeholder="Matrícula" class="form-input">
</div>

<!-- Código administrador -->
<div class="form-row">
    <input type="text"
           name="admin_code"
           id="admin_code"
           placeholder="Código Verificar Administrador"
           class="form-input">

    <button type="button"
            id="validarBtn"
            onclick="validateCode()"
            class="btn-custom"
            style="width:150px;">
        Validar
    </button>
</div>

<!-- Foto -->
<div class="form-row">
    <input type="file" name="foto" accept="image/*" onchange="previewImage(event)" class="form-input">
    <img id="preview" class="preview-img">
</div>

<!-- Buttons -->
<div class="btn-container">
    <button type="submit" class="btn-custom">Guardar</button>
    <a href="{{ url_for('login') }}" class="btn-custom" style="text-decoration:none; text-align:center; line-height:38px;">Volver</a>
</div>

</form>
</div>
</div>

<script>
let adminValidated = false;

function validateCode() {
    const code = document.getElementById("admin_code").value;
    const button = document.getElementById("validarBtn");

    fetch("/validate_admin_code", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "code=" + encodeURIComponent(code)
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === "valid") {
            button.style.backgroundColor = "green";
            button.innerText = "✔";
            adminValidated = true;
        } else {
            button.style.backgroundColor = "red";
            button.innerText = "✖";
            adminValidated = false;
        }
    });
}

document.querySelector("form").addEventListener("submit", function(e) {
    if (!adminValidated) {
        alert("Debe validar el código de administrador antes de guardar ❌");
        e.preventDefault();
    }
});

function mostrarMatricula() {
    const rol = document.getElementById("rol").value;
    const matricula = document.getElementById("matricula");

    if (rol === "Alumno") {
        matricula.required = true;
    } else {
        matricula.required = false;
        matricula.value = "";
    }
}

function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById("preview").src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

{% endblock %}
