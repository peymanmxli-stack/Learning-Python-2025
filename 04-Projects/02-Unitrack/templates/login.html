{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #3d0066;
}

/* Outer Background */
.main-section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main Card */
.content-box {
    background-color: #5f0fa3;
    width: 99%;
    max-width: 1900px;
    min-height: 1000px;
    border-radius: 70px;
    border: 10px solid gold;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);

    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 60px;
    text-align: center;
}

/* Logo */
.main-logo {
    width: 420px;
    margin-bottom: 40px;
}

/* Title */
.system-title {
    font-size: 26px;
    color: white;
    margin-bottom: 40px;
}

/* Input Fields */
.form-input {
    width: 350px;
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

/* Button Group */
.button-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
}

/* Buttons */
.btn-custom {
    width: 240px;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(to right, #2b7de9, #1f5fd1);
    color: white;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s ease;
}

.btn-custom:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #1f5fd1, #144bb0);
}

/* Forgot Password */
.forgot-link {
    color: white;
    margin-top: 20px;
    font-size: 15px;
    text-decoration: none;
}

.forgot-link:hover {
    text-decoration: underline;
}

/* Error Message */
.error-msg {
    color: #ffcccc;
    margin-bottom: 15px;
}
</style>

<div class="main-section">
    <div class="content-box">

        <img src="{{ url_for('static', filename='images/logo.png') }}" class="main-logo">

        <div class="system-title">
            Iniciar Sesión
        </div>

        {% if mensaje %}
            <div class="error-msg">{{ mensaje }}</div>
        {% endif %}

        <form method="POST">

            <input type="text" name="username" placeholder="Usuario" class="form-input" required>
            <input type="password" name="password" placeholder="Contraseña" class="form-input" required>

            <div class="button-group">
                <button type="submit" class="btn-custom">Entrar</button>
                <a href="/" class="btn-custom">Volver</a>
            </div>

        </form>

        <!-- THIS IS THE IMPORTANT FIX -->
        <a href="{{ url_for('forgot_password') }}" class="forgot-link">
            ¿Olvidaste contraseña?
        </a>

    </div>
</div>

{% endblock %}
